<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>FYND TODAY</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  -webkit-tap-highlight-color: transparent;
}
:root {
  --bg: #FCFBF4;
  --black: #000000;
  --f: 'DejaVu LGC Sans', 'DM Sans', Arial, sans-serif;
}
html, body {
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: var(--bg);
  font-family: var(--f);
  -webkit-font-smoothing: antialiased;
}
.screen {
  position: fixed;
  inset: 0;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 0 32px;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.4s ease;
}
.screen.active {
  opacity: 1;
  pointer-events: all;
}

/* S1 */
#s1 { background: var(--bg); justify-content: center; cursor: pointer; }
.s1-word {
  font-size: clamp(52px, 12vw, 88px);
  font-weight: 400;
  color: var(--black);
  letter-spacing: -0.02em;
  user-select: none;
}
.s1-hint {
  position: absolute;
  bottom: 44px;
  font-size: 11px;
  color: var(--black);
  opacity: 0.25;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  animation: ph 3s ease-in-out infinite;
}
@keyframes ph { 0%,100%{opacity:.15} 50%{opacity:.35} }

/* S2 */
#s2 {
  background: var(--bg);
  justify-content: flex-start;
  padding-top: clamp(56px, 11vh, 88px);
  overflow-y: auto;
}

/* S3 — LISTEN */
#s3 { background: var(--black); justify-content: center; }
.listen-label {
  position: absolute;
  top: clamp(36px, 7vh, 52px);
  left: 32px;
  font-size: 11px;
  color: var(--bg);
  opacity: 0.3;
  letter-spacing: 0.12em;
  text-transform: uppercase;
}
.pulse-wrap { display: flex; flex-direction: column; align-items: center; gap: 36px; }
.pulse-dot {
  width: 10px; height: 10px; border-radius: 50%;
  background: var(--bg); opacity: 0.55;
  animation: pd 2s ease-in-out infinite;
}
@keyframes pd { 0%,100%{transform:scale(1);opacity:.5} 50%{transform:scale(1.5);opacity:.85} }
.track-count { font-size: 11px; color: var(--bg); opacity: 0.2; letter-spacing: 0.18em; }

/* S4 — ASSIGN — overlays on top of listen screen, semi-transparent bg */
#s4 {
  background: var(--black);
  justify-content: flex-start;
  padding-top: clamp(56px, 11vh, 88px);
  overflow-y: auto;
}

/* S5 — REVEAL */
#s5 { background: var(--bg); justify-content: center; gap: 12px; cursor: pointer; }
.reveal-label {
  font-size: 11px; color: var(--black); opacity: 0.35;
  letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 12px;
}
.reveal-title {
  font-size: clamp(22px, 5.5vw, 34px); font-weight: 400;
  color: var(--black); text-align: center; letter-spacing: -0.01em; line-height: 1.2;
}
.reveal-artist { font-size: clamp(14px, 3.2vw, 17px); color: var(--black); opacity: 0.4; text-align: center; }
.reveal-hint { position: absolute; bottom: clamp(72px,12vh,96px); font-size: 11px; color: var(--black); opacity: 0.2; letter-spacing: 0.1em; }
.reveal-cta { position: absolute; bottom: clamp(36px,7vh,52px); font-size: 11px; color: var(--black); opacity: 0.18; letter-spacing: 0.12em; text-transform: uppercase; }

/* S6 — EMAIL */
#s6 { background: var(--bg); justify-content: center; }
.email-head { font-size: clamp(30px,7vw,46px); font-weight: 400; color: var(--black); letter-spacing: -0.02em; margin-bottom: 44px; text-align: center; }
.email-input {
  width: 100%; max-width: 300px; font-family: var(--f); font-size: 16px;
  color: var(--black); background: transparent; border: none;
  border-bottom: 1px solid rgba(0,0,0,0.45); padding: 10px 0;
  outline: none; text-align: center; border-radius: 0; -webkit-appearance: none;
}
.email-input::placeholder { color: var(--black); opacity: 0.22; }
.email-sub {
  display: block; margin: 28px auto 0; font-family: var(--f); font-size: 12px;
  color: var(--black); background: none; border: none; cursor: pointer;
  letter-spacing: 0.14em; text-transform: uppercase; opacity: 0.45; padding: 10px 20px;
}

/* SHARED LABEL + STATEMENTS */
.screen-label {
  font-size: 11px; color: var(--black); opacity: 0.35;
  letter-spacing: 0.12em; text-transform: uppercase;
  margin-bottom: 40px; align-self: flex-start;
}
#s4 .screen-label { color: var(--bg); opacity: 0.4; }

.stmt {
  width: 100%; padding: 20px 0;
  font-size: clamp(15px, 3.8vw, 18px); font-weight: 400;
  color: var(--black); line-height: 1.55;
  border-bottom: 1px solid rgba(0,0,0,0.08);
  cursor: pointer; user-select: none;
  transition: opacity 0.15s ease;
}
.stmt:first-of-type { border-top: 1px solid rgba(0,0,0,0.08); }
.stmt.tapped { opacity: 0.3; pointer-events: none; }

/* Assign screen statements are white on black */
#assign-list .stmt {
  color: var(--bg);
  border-bottom-color: rgba(255,255,255,0.1);
}
#assign-list .stmt:first-of-type { border-top-color: rgba(255,255,255,0.1); }

/* PROGRESS DOTS */
#dots {
  position: fixed;
  bottom: clamp(24px, 4.5vh, 40px);
  left: 50%;
  transform: translateX(-50%);
  display: flex; gap: 8px;
  pointer-events: none;
  opacity: 0; transition: opacity 0.4s ease;
  z-index: 999;
}
#dots.show { opacity: 1; }
.dot { width: 5px; height: 5px; border-radius: 50%; background: var(--black); opacity: 0.15; transition: opacity 0.3s ease; }
.dot.done { opacity: 0.5; }
.dot.active { opacity: 1; }
#dots.dark .dot { background: var(--bg); }

#sc-wrap { position: absolute; top: -9999px; left: -9999px; width: 1px; height: 1px; overflow: hidden; }
</style>
</head>
<body>

<div id="dots">
  <div class="dot" id="d1"></div>
  <div class="dot" id="d2"></div>
  <div class="dot" id="d3"></div>
  <div class="dot" id="d4"></div>
  <div class="dot" id="d5"></div>
</div>

<!-- S1 ARRIVAL -->
<div class="screen active" id="s1">
  <span class="s1-word">Today.</span>
  <span class="s1-hint">tap to begin</span>
</div>

<!-- S2 ENTRY -->
<div class="screen" id="s2">
  <span class="screen-label">Where are you right now</span>
  <div id="entry-list"></div>
</div>

<!-- S3 LISTEN -->
<div class="screen" id="s3">
  <span class="listen-label">Listen</span>
  <div class="pulse-wrap">
    <div class="pulse-dot"></div>
    <div class="track-count" id="tc">1 — 5</div>
  </div>
  <div id="sc-wrap">
    <iframe id="sc" width="100%" height="166" scrolling="no" frameborder="no" allow="autoplay"
      src="https://w.soundcloud.com/player/?url=https%3A//soundcloud.com/fynd-today/sets/mvp-1&auto_play=false&hide_related=true&show_comments=false&show_user=false&show_reposts=false&show_teaser=false&visual=false">
    </iframe>
  </div>
</div>

<!-- S4 ASSIGN — shown while music still plays -->
<div class="screen" id="s4">
  <span class="screen-label">Where did that sit</span>
  <div id="assign-list"></div>
</div>

<!-- S5 REVEAL -->
<div class="screen" id="s5">
  <span class="reveal-label">That was</span>
  <div class="reveal-title" id="r-title">—</div>
  <div class="reveal-artist" id="r-artist">—</div>
  <span class="reveal-hint">tap to continue</span>
  <span class="reveal-cta">Press Play on Today.</span>
</div>

<!-- S6 EMAIL -->
<div class="screen" id="s6">
  <div class="email-head" id="email-head">More comes.</div>
  <input class="email-input" id="email-in" type="email" placeholder="your email" autocomplete="email" autocapitalize="none">
  <button class="email-sub" id="email-sub">In.</button>
</div>

<script src="https://w.soundcloud.com/player/api.js"></script>
<script>

var TRACKS = [
  { id:'T001', title:'Soul',          artist:'Lee Brice'   },
  { id:'T002', title:"We Don't Care", artist:'Akon'        },
  { id:'T003', title:'In Between',    artist:'Nija'        },
  { id:'T004', title:'I See Life',    artist:'thekidszn'   },
  { id:'T005', title:'Alvarado',      artist:'Sean Jacobs' },
];

var STMTS = [
  { text:'Something is unresolved and the day keeps moving.',              state:'Holding'    },
  { text:"Something finished. The next thing hasn't started yet.",         state:'Between'    },
  { text:"You're moving. Nothing specific is pulling you forward.",        state:'Drifting'   },
  { text:'Everything keeps sliding past without landing.',                 state:'Unanchored' },
  { text:"Something is in front of you. You haven't stepped into it yet.", state:'Before'     },
];

var sess = {
  id: 'S' + Date.now().toString(36).toUpperCase(),
  entryState: null,
  cur: 0,
  tOrder: [],
  sOrder: [],
  listenStart: null,
  dur: 0,
  log: [],
};

function shuffle(a) {
  var b = a.slice();
  for (var i = b.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var t = b[i]; b[i] = b[j]; b[j] = t;
  }
  return b;
}

function show(id) {
  var all = document.querySelectorAll('.screen');
  for (var i = 0; i < all.length; i++) all[i].classList.remove('active');
  setTimeout(function() {
    document.getElementById(id).classList.add('active');
  }, 40);
  var dots = document.getElementById('dots');
  if (id === 's3' || id === 's4' || id === 's5') {
    dots.classList.add('show');
    dots.classList.toggle('dark', id === 's3' || id === 's4');
  } else {
    dots.classList.remove('show');
    dots.classList.remove('dark');
  }
}

function setDots(cur) {
  for (var i = 1; i <= 5; i++) {
    var d = document.getElementById('d' + i);
    d.classList.remove('active','done');
    if (i < cur + 1) d.classList.add('done');
    if (i === cur + 1) d.classList.add('active');
  }
}

function buildList(elId, includeNone, cb) {
  var el = document.getElementById(elId);
  el.innerHTML = '';
  // Use a fresh copy of sOrder to guarantee correct indices
  var order = sess.sOrder.slice();
  for (var i = 0; i < order.length; i++) {
    (function(idx) {
      var s = STMTS[idx];
      var d = document.createElement('div');
      d.className = 'stmt';
      d.textContent = s.text;
      d.addEventListener('click', function() {
        if (d.classList.contains('tapped')) return;
        d.classList.add('tapped');
        var captured = s.state;
        setTimeout(function() { cb(captured); }, 150);
      });
      el.appendChild(d);
    })(order[i]);
  }
  if (includeNone) {
    var n = document.createElement('div');
    n.className = 'stmt';
    n.textContent = 'None of these.';
    n.addEventListener('click', function() {
      if (n.classList.contains('tapped')) return;
      n.classList.add('tapped');
      setTimeout(function() { cb('None of These'); }, 150);
    });
    el.appendChild(n);
  }
}

// SoundCloud
var widget, widgetReady = false, assignTimer, autoTimer;

function initSC() {
  widget = SC.Widget(document.getElementById('sc'));
  widget.bind(SC.Widget.Events.READY, function() { widgetReady = true; });
  widget.bind(SC.Widget.Events.FINISH, function() { stopAndReveal(); });
}

function playTrack(idx) {
  function go() {
    widget.skip(idx);
    setTimeout(function() { widget.play(); }, 300);
    sess.listenStart = Date.now();
    clearTimeout(assignTimer);
    clearTimeout(autoTimer);

    // After 1.5s — transition to assign screen, music keeps playing
    assignTimer = setTimeout(function() {
      buildList('assign-list', true, function(postState) {
        stopAndReveal(postState);
      });
      show('s4');
    }, 1500);

    // Hard stop at 90s if no selection made
    autoTimer = setTimeout(function() {
      if (widget) widget.pause();
      // Force assign screen if not already there
      buildList('assign-list', true, function(postState) {
        stopAndReveal(postState);
      });
      show('s4');
    }, 90000);

    document.getElementById('tc').textContent = (sess.cur + 1) + ' — 5';
    setDots(sess.cur);
  }
  if (widgetReady) {
    go();
  } else {
    var poll = setInterval(function() {
      if (widgetReady) { clearInterval(poll); go(); }
    }, 200);
  }
}

function stopAndReveal(postState) {
  clearTimeout(assignTimer);
  clearTimeout(autoTimer);
  if (widget) widget.pause();

  sess.dur = sess.listenStart
    ? Math.min(Math.round((Date.now() - sess.listenStart) / 1000), 90)
    : 0;

  if (postState) {
    var ti = sess.tOrder[sess.cur];
    var tr = TRACKS[ti] || { id:'T00'+(ti+1), title:'—', artist:'—' };
    sess.log.push({
      sessionId:  sess.id,
      trackId:    tr.id,
      entryState: sess.entryState,
      postState:  postState,
      duration:   sess.dur,
      match:      sess.entryState === postState ? 'Yes' : 'No',
    });
    document.getElementById('r-title').textContent  = tr.title;
    document.getElementById('r-artist').textContent = tr.artist;
    show('s5');
  }
}

// S1 tap
document.getElementById('s1').addEventListener('click', function() {
  sess.sOrder = shuffle([0,1,2,3,4]);
  sess.tOrder = shuffle([0,1,2,3,4]);

  buildList('entry-list', false, function(state) {
    sess.entryState = state;
    show('s3');
    setTimeout(function() { playTrack(sess.tOrder[sess.cur]); }, 600);
  });

  show('s2');
});

// S5 reveal tap
document.getElementById('s5').addEventListener('click', function() {
  sess.cur++;
  if (sess.cur < 5) {
    show('s3');
    setTimeout(function() { playTrack(sess.tOrder[sess.cur]); }, 600);
  } else {
    show('s6');
  }
});

// Email
document.getElementById('email-sub').addEventListener('click', function() {
  var email = document.getElementById('email-in').value.trim();
  if (!email || !email.includes('@')) {
    document.getElementById('email-in').style.borderBottomColor = 'rgba(0,0,0,0.9)';
    return;
  }
  document.getElementById('email-in').style.display = 'none';
  document.getElementById('email-sub').style.display = 'none';
  var h = document.getElementById('email-head');
  h.textContent = "You'll hear when something new arrives.";
  h.style.fontSize = '18px';
  h.style.opacity = '0.4';

  console.log('FYND SESSION', JSON.stringify({ id: sess.id, email: email, entryState: sess.entryState, log: sess.log }, null, 2));
});

document.getElementById('email-in').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') document.getElementById('email-sub').click();
});

initSC();

</script>
</body>
</html>
