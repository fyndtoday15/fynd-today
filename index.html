<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" id="theme-color" content="#FCFBF4">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>FYND TODAY</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
:root { --bg: #FCFBF4; --black: #000000; --f: 'DejaVu LGC Sans','DM Sans',Arial,sans-serif; }
html { background: var(--bg); transition: background 0.4s ease; }
body { width: 100%; height: 100%; overflow: hidden; background: var(--bg); font-family: var(--f); -webkit-font-smoothing: antialiased; transition: background 0.4s ease; }
html.listen-mode, body.listen-mode { background: var(--black); }
html.assign-top, body.assign-top { background: var(--black); }


.screen {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  display: flex; flex-direction: column; align-items: center;
  padding: calc(env(safe-area-inset-top) + 0px) 32px calc(env(safe-area-inset-bottom) + 0px);
  opacity: 0; pointer-events: none;
  transition: opacity 0.3s ease;
}
.screen.active { opacity: 1; pointer-events: all; }

/* S1 — ARRIVAL */
#s1 { background: var(--bg); justify-content: center; cursor: pointer; }
.s1-word { font-size: clamp(52px,12vw,88px); font-weight: 400; color: var(--black); letter-spacing: -0.02em; user-select: none; margin-bottom: 32px; }
.s1-intro { font-size: clamp(15px,3.8vw,18px); color: var(--black); opacity: 0.7; text-align: center; line-height: 1.6; max-width: 320px; margin-bottom: 48px; }
.s1-hint { font-size: 15px; color: var(--black); opacity: 0.7; letter-spacing: 0.12em; text-transform: uppercase; animation: ph 3s ease-in-out infinite; }
@keyframes ph { 0%,100%{opacity:.4} 50%{opacity:.8} }

/* S2 — ENTRY */
#s2 { background: var(--bg); justify-content: flex-start; padding-top: clamp(56px,11vh,88px); overflow-y: auto; -webkit-overflow-scrolling: touch; }
.screen-label { font-size: 15px; color: var(--black); opacity: 0.75; letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 40px; align-self: flex-start; }
.stmt { width: 100%; padding: 20px 0; font-size: clamp(17px,4.2vw,20px); font-weight: 400; color: var(--black); line-height: 1.55; border-bottom: 1px solid rgba(0,0,0,0.08); cursor: pointer; user-select: none; transition: opacity 0.15s ease; }
.stmt:first-of-type { border-top: 1px solid rgba(0,0,0,0.08); }
.stmt.tapped { opacity: 0.3; pointer-events: none; }

/* S3 — LISTEN */
#s3 { background: var(--black); padding: 0; justify-content: flex-start; overflow: hidden; }

.listen-top {
  width: 100%; flex-grow: 1; flex-shrink: 1;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  position: relative;
  transition: flex-grow 0.6s cubic-bezier(0.4,0,0.2,1);
  min-height: 0;
}
.listen-label { position: absolute; top: clamp(36px,7vh,52px); left: 32px; font-size: 16px; color: var(--bg); opacity: 0.75; letter-spacing: 0.12em; text-transform: uppercase; }
.pulse-wrap { display: flex; flex-direction: column; align-items: center; gap: 28px; }
.pulse-dot { width: 28px; height: 28px; border-radius: 50%; background: var(--bg); opacity: 0.8; animation: pd 2s ease-in-out infinite; }
.pulse-dot.stopped { animation-play-state: paused; opacity: 0.3; transform: scale(1); transition: opacity 0.3s ease; }
@keyframes pd { 0%,100%{transform:scale(1);opacity:.6} 50%{transform:scale(1.5);opacity:1} }
.track-count { font-size: 15px; color: var(--bg); opacity: 0.75; letter-spacing: 0.18em; }

/* Ready prompt — appears at 30s */
.ready-prompt {
  position: absolute;
  bottom: clamp(120px,20vh,150px);
  left: 50%;
  transform: translateX(-50%);
  font-size: 12px;
  color: var(--bg);
  opacity: 0;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  cursor: pointer;
  padding: 16px 24px;
  pointer-events: none;
  white-space: nowrap;
  display: flex;
  align-items: center;
  gap: 8px;
}
.ready-prompt.show {
  pointer-events: all;
  animation: ph-white 3s ease-in-out infinite;
  animation-delay: 0s;
}
@keyframes ph-white { 0%{opacity:.45} 50%{opacity:.85} 100%{opacity:.45} }
.ready-prompt-arrow { font-size: 16px; }

/* ASSIGN PANEL — slides up as off-white */
.assign-panel {
  width: 100%;
  flex-shrink: 0;
  max-height: 0;
  overflow: hidden;
  background: var(--bg);
  transition: max-height 0.6s cubic-bezier(0.4,0,0.2,1);
  display: flex;
  flex-direction: column;
  padding: 0 32px;
  border-radius: 20px 20px 0 0;
  position: relative;
  z-index: 1000;
}
.assign-panel.open {
  height: 58vh;
  max-height: 58vh;
  overflow-y: scroll;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior: contain;
}
@media (min-width: 768px) {
  .assign-panel.open {
    height: 72vh;
    max-height: 72vh;
  }
}
.assign-entry-state {
  font-size: 13px;
  color: var(--black);
  opacity: 0.4;
  letter-spacing: 0.08em;
  margin-top: 28px;
  margin-bottom: 4px;
  flex-shrink: 0;
}
.assign-label { font-size: 15px; color: var(--black); opacity: 0.75; letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 20px; margin-top: 8px; flex-shrink: 0; }
.assign-stmt { width: 100%; padding: 16px 0; font-size: clamp(17px,4.2vw,20px); font-weight: 400; color: var(--black); line-height: 1.5; border-bottom: 1px solid rgba(0,0,0,0.08); cursor: pointer; user-select: none; transition: opacity 0.15s ease; flex-shrink: 0; }
.assign-stmt:first-of-type { border-top: 1px solid rgba(0,0,0,0.08); }
.assign-stmt.tapped { opacity: 0.3; pointer-events: none; }

/* S5 — REVEAL */
#s5 { background: var(--bg); justify-content: center; gap: 12px; }
.reveal-label { font-size: 15px; color: var(--black); opacity: 0.75; letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 12px; }
.reveal-title { font-size: clamp(26px,6vw,38px); font-weight: 400; color: var(--black); text-align: center; letter-spacing: -0.01em; line-height: 1.2; }
.reveal-artist { font-size: clamp(16px,3.8vw,20px); color: var(--black); opacity: 0.65; text-align: center; }

.reveal-actions {
  position: absolute;
  bottom: clamp(36px,8vh,60px);
  width: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
  padding: 0 32px;
}
.btn-continue {
  font-family: var(--f);
  font-size: 14px;
  color: var(--black);
  background: none;
  border: 1px solid rgba(0,0,0,0.25);
  border-radius: 2px;
  padding: 14px 40px;
  cursor: pointer;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  width: 100%;
  max-width: 280px;
  transition: opacity 0.2s ease;
  animation: ph 3s ease-in-out infinite;
}
.btn-stop {
  font-family: var(--f);
  font-size: 12px;
  color: var(--black);
  background: none;
  border: none;
  cursor: pointer;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  opacity: 0.35;
  padding: 8px;
  transition: opacity 0.2s ease;
  animation: ph 3s ease-in-out infinite;
}
.reveal-cta { font-size: 12px; color: var(--black); opacity: 0.6; letter-spacing: 0.12em; text-transform: uppercase; }

/* S6 — EMAIL */
#s6 { background: var(--bg); justify-content: center; }
.email-head { font-size: clamp(30px,7vw,46px); font-weight: 400; color: var(--black); letter-spacing: -0.02em; margin-bottom: 44px; text-align: center; }
.email-input { width: 100%; max-width: 300px; font-family: var(--f); font-size: 16px; color: var(--black); background: transparent; border: none; border-bottom: 1px solid rgba(0,0,0,0.45); padding: 10px 0; outline: none; text-align: center; border-radius: 0; -webkit-appearance: none; }
.email-input::placeholder { color: var(--black); opacity: 0.22; }
.email-sub { display: block; margin: 28px auto 0; font-family: var(--f); font-size: 12px; color: var(--black); background: none; border: none; cursor: pointer; letter-spacing: 0.14em; text-transform: uppercase; opacity: 0.45; padding: 10px 20px; }

/* DOTS */
#dots { position: fixed; bottom: clamp(24px,4.5vh,40px); left: 50%; transform: translateX(-50%); display: flex; gap: 8px; pointer-events: none; opacity: 0; transition: opacity 0.3s ease; z-index: 999; }
#dots.show { opacity: 1; }
.dot { width: 5px; height: 5px; border-radius: 50%; background: var(--black); opacity: 0.15; transition: opacity 0.3s ease; }
.dot.done { opacity: 0.5; }
.dot.active { opacity: 1; }
#dots.dark .dot { background: var(--bg); }

#sc-wrap { position: absolute; top: -9999px; left: -9999px; width: 1px; height: 1px; overflow: hidden; }
</style>
</head>
<body>

<div id="safe-top" style="position:fixed;top:0;left:0;right:0;height:max(env(safe-area-inset-top),50px);background:#FCFBF4;z-index:9999;"></div>
<div id="safe-bot" style="position:fixed;bottom:0;left:0;right:0;height:max(env(safe-area-inset-bottom),34px);background:#FCFBF4;z-index:9999;"></div>
<div id="dots">
  <div class="dot" id="d1"></div>
  <div class="dot" id="d2"></div>
  <div class="dot" id="d3"></div>
  <div class="dot" id="d4"></div>
  <div class="dot" id="d5"></div>
</div>

<!-- S1 ARRIVAL -->
<div class="screen active" id="s1">
  <span class="s1-word">Today.</span>
  <p class="s1-intro">Find out where the music takes you.</p>
  <span class="s1-hint">tap to begin</span>
</div>

<!-- S2 ENTRY -->
<div class="screen" id="s2">
  <span class="screen-label">Where are you right now</span>
  <div id="entry-list"></div>
</div>

<!-- S3 LISTEN -->
<div class="screen" id="s3">
  <div class="listen-top" id="listen-top">
    <span class="listen-label">Listen</span>
    <div class="pulse-wrap">
      <div class="pulse-dot" id="pulse-dot"></div>
      <div class="track-count" id="tc">1 — 5</div>
    </div>
    <div class="ready-prompt" id="ready-prompt">
      <span>Answer now</span>
      <span class="ready-prompt-arrow">↑</span>
    </div>
  </div>
  <div class="assign-panel" id="assign-panel">
    <div class="assign-entry-state" id="assign-entry-state"></div>
    <div class="assign-label">Where do you sit now</div>
    <div id="assign-list" style="padding-bottom: 32px;"></div>
  </div>
  <div id="sc-wrap">
    <iframe id="sc" width="100%" height="166" scrolling="no" frameborder="no"
      allow="autoplay; encrypted-media; picture-in-picture" allowfullscreen
      src="https://w.soundcloud.com/player/?url=https%3A//soundcloud.com/fynd-today/sets/mvp-1&auto_play=false&hide_related=true&show_comments=false&show_user=false&show_reposts=false&show_teaser=false&visual=false">
    </iframe>
  </div>
</div>

<!-- S5 REVEAL -->
<div class="screen" id="s5">
  <span class="reveal-label">That was</span>
  <div class="reveal-title" id="r-title">—</div>
  <div class="reveal-artist" id="r-artist">—</div>
  <div class="reveal-actions">
    <span class="reveal-cta">Press Play on Today.</span>
    <button class="btn-continue" id="btn-continue">Continue</button>
    <button class="btn-stop" id="btn-stop">Stop for now</button>
  </div>
</div>

<!-- S6 EMAIL -->
<div class="screen" id="s6">
  <div class="email-head" id="email-head">More comes.</div>
  <input class="email-input" id="email-in" type="email" placeholder="your email" autocomplete="email" autocapitalize="none">
  <button class="email-sub" id="email-sub">In.</button>
</div>

<script src="https://w.soundcloud.com/player/api.js"></script>
<script>

var TRACKS = [
  { id:'T001', title:'Soul',          artist:'Lee Brice'   },
  { id:'T002', title:"We Don't Care", artist:'Akon'        },
  { id:'T003', title:'In Between',    artist:'Nija'        },
  { id:'T004', title:'I See Life',    artist:'thekidszn'   },
  { id:'T005', title:'Alvarado',      artist:'Sean Jacobs' },
];

var STMTS = [
  { text:'Something is unresolved and the day keeps moving.',              state:'Holding'    },
  { text:"Something finished. The next thing hasn't started yet.",         state:'Between'    },
  { text:"You're moving. Nothing specific is pulling you forward.",        state:'Drifting'   },
  { text:'Everything keeps sliding past without landing.',                 state:'Unanchored' },
  { text:"Something is in front of you. You haven't stepped into it yet.", state:'Before'     },
];

var sess = {
  id: 'S' + Date.now().toString(36).toUpperCase(),
  entryState: null,
  cur: 0,
  tOrder: [],
  listenStart: null,
  dur: 0,
  log: [],
};

function shuffle(arr) {
  var a = arr.slice(), i = a.length, j, t;
  while (i--) { j = Math.floor(Math.random() * (i + 1)); t = a[i]; a[i] = a[j]; a[j] = t; }
  return a;
}

function show(id) {
  var all = document.querySelectorAll('.screen');
  for (var i = 0; i < all.length; i++) all[i].classList.remove('active');
  setTimeout(function() {
    var next = document.getElementById(id);
    if (next) next.classList.add('active');
  }, 40);

  var dots = document.getElementById('dots');
  if (id === 's3' || id === 's5') {
    dots.classList.add('show');
    dots.classList.toggle('dark', id === 's3');
  } else {
    dots.classList.remove('show');
    dots.classList.remove('dark');
  }
  var tc = document.getElementById('theme-color');
  var st = document.getElementById('safe-top');
  var sb = document.getElementById('safe-bot');
  if (id === 's3') {
    if (tc) tc.content = '#000000';
    if (st) { st.style.transition = 'none'; st.style.background = '#000000'; }
    if (sb) { sb.style.transition = 'none'; sb.style.background = '#000000'; }
  } else {
    if (tc) tc.content = '#FCFBF4';
    if (st) { st.style.transition = 'none'; st.style.background = '#FCFBF4'; }
    if (sb) { sb.style.transition = 'none'; sb.style.background = '#FCFBF4'; }
  }
}

function setDots(cur) {
  for (var i = 1; i <= 5; i++) {
    var d = document.getElementById('d' + i);
    d.classList.remove('active','done');
    if (i < cur + 1) d.classList.add('done');
    if (i === cur + 1) d.classList.add('active');
  }
}

function stopDot() {
  var dot = document.getElementById('pulse-dot');
  if (dot) dot.classList.add('stopped');
}

function startDot() {
  var dot = document.getElementById('pulse-dot');
  if (dot) dot.classList.remove('stopped');
}

function buildList(elId, cls, includeNone, cb) {
  var el = document.getElementById(elId);
  el.innerHTML = '';
  var order = shuffle([0,1,2,3,4]);
  for (var i = 0; i < order.length; i++) {
    (function(s) {
      var d = document.createElement('div');
      d.className = cls;
      d.textContent = s.text;
      d.addEventListener('click', function() {
        if (d.classList.contains('tapped')) return;
        d.classList.add('tapped');
        var st = s.state;
        setTimeout(function() { cb(st); }, 150);
      });
      el.appendChild(d);
    })(STMTS[order[i]]);
  }
  if (includeNone) {
    var n = document.createElement('div');
    n.className = cls;
    n.textContent = 'Something else entirely.';
    n.addEventListener('click', function() {
      if (n.classList.contains('tapped')) return;
      n.classList.add('tapped');
      setTimeout(function() { cb('Something Else'); }, 150);
    });
    el.appendChild(n);
  }
}

function openPanel(cb) {
  // Swap listen label to Answer
  var lbl = document.querySelector('.listen-label');
  if (lbl) lbl.textContent = 'Answer';
  // Fix Safari scroll — prevent touch events bubbling to fixed parent
  var panel = document.getElementById('assign-panel');
  panel.addEventListener('touchmove', function(e) {
    e.stopPropagation();
  }, { passive: true });
  // Safe area: top stays black, bottom becomes off-white
  var sb = document.getElementById('safe-bot');
  if (sb) { sb.style.transition = 'none'; sb.style.background = '#FCFBF4'; }
  // Show entry state at top of panel
  var stateEl = document.getElementById('assign-entry-state');
  if (stateEl && sess.entryState) {
    stateEl.textContent = 'You came in as — ' + sess.entryState;
  }
  buildList('assign-list', 'assign-stmt', true, cb);
  // Hide ready prompt
  document.getElementById('ready-prompt').classList.remove('show');
  document.getElementById('ready-prompt').style.pointerEvents = 'none';
  document.getElementById('assign-panel').classList.add('open');
}

function resetPanel() {
  var panel = document.getElementById('assign-panel');
  // Kill transition instantly so no white flash
  panel.style.transition = 'none';
  panel.style.maxHeight = '0';
  panel.classList.remove('open');
  document.getElementById('assign-list').innerHTML = '';
  document.getElementById('ready-prompt').classList.remove('show');
  document.getElementById('ready-prompt').style.pointerEvents = 'none';
  // Restore listen label
  var lbl = document.querySelector('.listen-label');
  if (lbl) lbl.textContent = 'Listen';
  // Safe area back to full black
  var sb = document.getElementById('safe-bot');
  if (sb) { sb.style.transition = 'none'; sb.style.background = '#000000'; }
  // Restore transition after reset
  setTimeout(function() {
    panel.style.transition = '';
    panel.style.maxHeight = '';
  }, 100);
}

// SoundCloud
var widget, widgetReady = false, readyTimer, autoTimer;

function initSC() {
  widget = SC.Widget(document.getElementById('sc'));
  widget.bind(SC.Widget.Events.READY, function() { widgetReady = true; });
  widget.bind(SC.Widget.Events.FINISH, function() {
    if (widget) widget.pause();
    stopDot();
    if (!document.getElementById('assign-panel').classList.contains('open')) {
      openPanel(function(ps) { doReveal(ps); });
    }
  });
}

function playTrack(idx) {
  function go() {
    resetPanel();
    startDot();
    widget.skip(idx);
    setTimeout(function() { widget.play(); }, 300);
    sess.listenStart = Date.now();
    clearTimeout(readyTimer);
    clearTimeout(autoTimer);

    // At 30s — show subtle ready prompt
    readyTimer = setTimeout(function() {
      var prompt = document.getElementById('ready-prompt');
      prompt.classList.add('show');
      prompt.style.pointerEvents = 'all';
    }, 30000);

    // At 90s — hard open panel regardless
    autoTimer = setTimeout(function() {
      if (widget) widget.pause();
      stopDot();
      if (!document.getElementById('assign-panel').classList.contains('open')) {
        openPanel(function(ps) { doReveal(ps); });
      }
    }, 90000);

    document.getElementById('tc').textContent = (sess.cur + 1) + ' — 5';
    setDots(sess.cur);
  }
  if (widgetReady) {
    go();
  } else {
    var poll = setInterval(function() { if (widgetReady) { clearInterval(poll); go(); } }, 200);
  }
}

// Ready prompt tap — open panel immediately
document.getElementById('ready-prompt').addEventListener('click', function() {
  clearTimeout(autoTimer);
  if (widget) widget.pause();
  stopDot();
  openPanel(function(ps) { doReveal(ps); });
});

function doReveal(ps) {
  clearTimeout(readyTimer);
  clearTimeout(autoTimer);
  if (widget) widget.pause();
  stopDot();
  sess.dur = sess.listenStart ? Math.min(Math.round((Date.now() - sess.listenStart) / 1000), 90) : 0;
  var ti = sess.tOrder[sess.cur];
  var tr = TRACKS[ti] || { id:'T00'+(ti+1), title:'—', artist:'—' };
  sess.log.push({ sessionId:sess.id, trackId:tr.id, entryState:sess.entryState, postState:ps, duration:sess.dur, match:sess.entryState===ps?'Yes':'No' });
  document.getElementById('r-title').textContent = tr.title;
  document.getElementById('r-artist').textContent = tr.artist;
  show('s5');
}

// S1 tap
document.getElementById('s1').addEventListener('click', function() {
  sess.tOrder = shuffle([0,1,2,3,4]);
  // Prime Safari audio on first gesture
  if (widgetReady) {
    widget.skip(sess.tOrder[0]);
    widget.play();
    setTimeout(function() { widget.pause(); }, 200);
  }
  buildList('entry-list', 'stmt', true, function(state) {
    sess.entryState = state;
    show('s3');
    setTimeout(function() {
      var idx = sess.tOrder[sess.cur];
      if (widgetReady) {
        widget.skip(idx);
        widget.play();
        sess._playedOnGesture = true;
      }
      setTimeout(function() { playTrack(sess.tOrder[sess.cur]); }, 400);
    }, 250);
  });
  show('s2');
});

// Continue button
document.getElementById('btn-continue').addEventListener('click', function() {
  sess.cur++;
  if (sess.cur < 5) {
    // Reset panel immediately so off-white never shows during transition
    resetPanel();
    show('s3');
    // Play on user gesture for Safari
    if (widgetReady) {
      widget.skip(sess.tOrder[sess.cur]);
      widget.play();
      sess._playedOnGesture = true;
    }
    setTimeout(function() { playTrack(sess.tOrder[sess.cur]); }, 600);
  } else {
    show('s6');
  }
});

// Stop for now — go to email
document.getElementById('btn-stop').addEventListener('click', function() {
  show('s6');
});

// Email
document.getElementById('email-sub').addEventListener('click', function() {
  var email = document.getElementById('email-in').value.trim();
  if (!email || !email.includes('@')) { document.getElementById('email-in').style.borderBottomColor = 'rgba(0,0,0,0.9)'; return; }
  document.getElementById('email-in').style.display = 'none';
  document.getElementById('email-sub').style.display = 'none';
  var h = document.getElementById('email-head');
  h.textContent = "You'll hear when something new arrives.";
  h.style.fontSize = '18px';
  h.style.opacity = '0.6';
  console.log('FYND SESSION', JSON.stringify({ id:sess.id, email:email, entryState:sess.entryState, log:sess.log }, null, 2));
});

document.getElementById('email-in').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') document.getElementById('email-sub').click();
});

initSC();

// Prevent s3 from swallowing touchmove so assign panel can scroll on Safari
document.getElementById('s3').addEventListener('touchmove', function(e) {
  var panel = document.getElementById('assign-panel');
  if (panel && panel.classList.contains('open')) {
    // Allow scroll only inside the panel
    if (!panel.contains(e.target)) {
      e.preventDefault();
    }
  }
}, { passive: false });
</script>
</body>
</html>
