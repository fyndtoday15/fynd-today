<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" id="theme-color" content="#FCFBF4">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>FYND TODAY</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
:root { --bg: #FCFBF4; --black: #000000; --f: 'DejaVu LGC Sans','DM Sans',Arial,sans-serif; }
html { background: var(--bg); transition: background 0.4s ease; }
body { width: 100%; height: 100%; overflow: hidden; background: var(--bg); font-family: var(--f); -webkit-font-smoothing: antialiased; transition: background 0.4s ease; }
html.listen-mode, body.listen-mode { background: var(--black); }
html.assign-top, body.assign-top { background: var(--black); }


.screen {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  display: flex; flex-direction: column; align-items: center;
  padding: calc(env(safe-area-inset-top) + 0px) 32px calc(env(safe-area-inset-bottom) + 0px);
  opacity: 0; pointer-events: none;
  transition: opacity 0.3s ease;
}
.screen.active { opacity: 1; pointer-events: all; }

/* S1 — ARRIVAL */
#s1 { background: var(--bg); justify-content: center; cursor: pointer; }
.s1-word { font-size: clamp(52px,12vw,88px); font-weight: 400; color: var(--black); letter-spacing: -0.02em; user-select: none; margin-bottom: 32px; }
.s1-intro { font-size: clamp(15px,3.8vw,18px); color: var(--black); opacity: 0.7; text-align: center; line-height: 1.6; max-width: 320px; margin-bottom: 48px; }
.s1-hint { font-size: 15px; color: var(--black); opacity: 0.7; letter-spacing: 0.12em; text-transform: uppercase; animation: ph 3s ease-in-out infinite; }
@keyframes ph { 0%,100%{opacity:.4} 50%{opacity:.8} }

/* S2 — ENTRY */
#s2 { background: var(--bg); justify-content: flex-start; padding-top: clamp(56px,11vh,88px); overflow-y: auto; -webkit-overflow-scrolling: touch; position: relative; }
#s2::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 80px; background: linear-gradient(to bottom, transparent, var(--bg)); pointer-events: none; z-index: 2; }
.screen-label { font-size: 15px; color: var(--black); opacity: 0.75; letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 40px; align-self: flex-start; }
.stmt { width: 100%; padding: 16px 0; font-size: clamp(15px,3.8vw,18px); font-weight: 400; color: var(--black); line-height: 1.55; border-bottom: 1px solid rgba(0,0,0,0.08); cursor: pointer; user-select: none; transition: opacity 0.15s ease; }
.stmt:first-of-type { border-top: 1px solid rgba(0,0,0,0.08); }
.stmt.tapped { opacity: 0.3; pointer-events: none; }

/* S3 — LISTEN */
#s3 { background: var(--black); padding: 0; justify-content: flex-start; overflow: hidden; }

.listen-top {
  width: 100%; flex-grow: 1; flex-shrink: 1;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  position: relative;
  transition: flex-grow 0.6s cubic-bezier(0.4,0,0.2,1);
  min-height: 0;
}
.listen-label { position: absolute; top: clamp(36px,7vh,52px); left: 32px; font-size: 16px; color: var(--bg); opacity: 0.75; letter-spacing: 0.12em; text-transform: uppercase; }
.pulse-wrap { display: flex; flex-direction: column; align-items: center; gap: 28px; }
.pulse-dot { width: 28px; height: 28px; border-radius: 50%; background: var(--bg); opacity: 0.8; animation: pd 2s ease-in-out infinite; }
.pulse-dot.stopped { animation-play-state: paused; opacity: 0.3; transform: scale(1); transition: opacity 0.3s ease; }
@keyframes pd { 0%,100%{transform:scale(1);opacity:.6} 50%{transform:scale(1.5);opacity:1} }
.track-count { font-size: 15px; color: var(--bg); opacity: 0.75; letter-spacing: 0.18em; }

/* Ready prompt — appears at 30s */
.ready-prompt {
  position: absolute;
  bottom: clamp(120px,20vh,150px);
  left: 50%;
  transform: translateX(-50%);
  font-size: 12px;
  color: var(--bg);
  opacity: 0;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  cursor: pointer;
  padding: 16px 24px;
  pointer-events: none;
  white-space: nowrap;
  display: flex;
  align-items: center;
  gap: 8px;
}
.ready-prompt.show {
  pointer-events: all;
  animation: ph-white 3s ease-in-out infinite;
  animation-delay: 0s;
}
@keyframes ph-white { 0%{opacity:.45} 50%{opacity:.85} 100%{opacity:.45} }
.ready-prompt-arrow { font-size: 16px; }

/* ASSIGN PANEL — slides up as off-white */
.assign-panel {
  width: 100%;
  flex-shrink: 0;
  max-height: 0;
  overflow: hidden;
  background: var(--bg);
  transition: max-height 0.6s cubic-bezier(0.4,0,0.2,1);
  display: flex;
  flex-direction: column;
  padding: 0 32px;
  border-radius: 20px 20px 0 0;
  position: relative;
  z-index: 1000;
}
.assign-panel.open {
  height: auto;
  max-height: 52vh;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  overscroll-behavior: contain;
  padding-bottom: 24px;
}
@media (min-width: 768px) {
  .assign-panel.open {
    height: auto;
    max-height: 55vh;
  }
}

.assign-label { font-size: 15px; color: var(--black); opacity: 0.75; letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 20px; margin-top: 8px; flex-shrink: 0; }
.assign-stmt { width: 100%; padding: 16px 0; font-size: clamp(17px,4.2vw,20px); font-weight: 400; color: var(--black); line-height: 1.5; border-bottom: 1px solid rgba(0,0,0,0.08); cursor: pointer; user-select: none; transition: opacity 0.15s ease; flex-shrink: 0; }
.assign-stmt:first-of-type { border-top: 1px solid rgba(0,0,0,0.08); }
.assign-stmt.tapped { opacity: 0.3; pointer-events: none; }

/* S5 — REVEAL */
#s5 { background: var(--bg); justify-content: center; gap: 12px; }
.reveal-label { font-size: 15px; color: var(--black); opacity: 0.75; letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 12px; }
.reveal-title { font-size: clamp(26px,6vw,38px); font-weight: 400; color: var(--black); text-align: center; letter-spacing: -0.01em; line-height: 1.2; }
.reveal-artist { font-size: clamp(16px,3.8vw,20px); color: var(--black); opacity: 0.65; text-align: center; }

.reveal-actions {
  position: absolute;
  bottom: clamp(36px,8vh,60px);
  width: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 16px;
  padding: 0 32px;
}
.btn-continue {
  font-family: var(--f);
  font-size: 14px;
  color: var(--black);
  background: none;
  border: 1px solid rgba(0,0,0,0.25);
  border-radius: 2px;
  padding: 14px 40px;
  cursor: pointer;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  width: 100%;
  max-width: 280px;
  transition: opacity 0.2s ease;
  animation: ph 3s ease-in-out infinite;
}
.btn-stop {
  font-family: var(--f);
  font-size: 12px;
  color: var(--black);
  background: none;
  border: none;
  cursor: pointer;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  opacity: 0.35;
  padding: 8px;
  transition: opacity 0.2s ease;
  animation: ph 3s ease-in-out infinite;
}
.reveal-cta { font-size: 12px; color: var(--black); opacity: 0.6; letter-spacing: 0.12em; text-transform: uppercase; }

/* S7 — RECAP */
#s7 { background: var(--bg); justify-content: flex-start; padding-top: clamp(56px,11vh,88px); overflow-y: auto; -webkit-overflow-scrolling: touch; }
.recap-head { font-size: 15px; color: var(--black); opacity: 0.75; letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 32px; align-self: flex-start; }
.recap-track { width: 100%; padding: 18px 0; border-bottom: 1px solid rgba(0,0,0,0.08); }
.recap-track:first-of-type { border-top: 1px solid rgba(0,0,0,0.08); }
.recap-song { font-size: clamp(15px,3.8vw,17px); font-weight: 400; color: var(--black); line-height: 1.4; }
.recap-direction { font-size: clamp(12px,3vw,14px); color: var(--black); opacity: 0.4; margin-top: 4px; line-height: 1.4; }
.recap-continue { display: block; margin: 36px auto 0; font-family: var(--f); font-size: 14px; color: var(--black); background: none; border: 1px solid rgba(0,0,0,0.25); border-radius: 2px; padding: 14px 40px; cursor: pointer; letter-spacing: 0.1em; text-transform: uppercase; width: 100%; max-width: 280px; animation: ph 3s ease-in-out infinite; }

/* S6 — EMAIL */
#s6 { background: var(--bg); justify-content: center; }
.set-btn { font-family: var(--f); font-size: 13px; color: var(--black); background: none; border: 2px solid var(--black); border-radius: 2px; padding: 10px 20px; margin: 4px; cursor: pointer; letter-spacing: 0.1em; text-transform: uppercase; opacity: 1; transition: opacity 0.2s ease; }
.set-btn:active { opacity: 0.6; }
.set-btn.used { opacity: 0.25; pointer-events: none; border-color: rgba(0,0,0,0.25); cursor: default; }
.email-head { font-size: clamp(30px,7vw,46px); font-weight: 400; color: var(--black); letter-spacing: -0.02em; margin-bottom: 44px; text-align: center; }
.email-input { width: 100%; max-width: 300px; font-family: var(--f); font-size: 16px; color: var(--black); background: transparent; border: none; border-bottom: 1px solid rgba(0,0,0,0.45); padding: 10px 0; outline: none; text-align: center; border-radius: 0; -webkit-appearance: none; }
.email-input::placeholder { color: var(--black); opacity: 0.22; }
.email-sub { display: block; margin: 28px auto 0; font-family: var(--f); font-size: 14px; color: var(--black); background: none; border: 1px solid rgba(0,0,0,0.25); border-radius: 2px; padding: 14px 40px; cursor: pointer; letter-spacing: 0.1em; text-transform: uppercase; width: 100%; max-width: 280px; animation: ph 3s ease-in-out infinite; }

/* DOTS */
#dots { position: fixed; bottom: clamp(24px,4.5vh,40px); left: 50%; transform: translateX(-50%); display: flex; gap: 8px; pointer-events: none; opacity: 0; transition: opacity 0.3s ease; z-index: 999; }
#dots.show { opacity: 1; }
.dot { width: 5px; height: 5px; border-radius: 50%; background: var(--black); opacity: 0.15; transition: opacity 0.3s ease; }
.dot.done { opacity: 0.5; }
.dot.active { opacity: 1; }
#dots.dark .dot { background: var(--bg); }

#sc-wrap { position: absolute; top: -9999px; left: -9999px; width: 1px; height: 1px; overflow: hidden; }
</style>
</head>
<body>

<div id="safe-top" style="position:fixed;top:0;left:0;right:0;height:max(env(safe-area-inset-top),50px);background:#FCFBF4;z-index:9999;"></div>
<div id="safe-bot" style="position:fixed;bottom:0;left:0;right:0;height:max(env(safe-area-inset-bottom),34px);background:#FCFBF4;z-index:9999;"></div>
<div id="dots">
  <div class="dot" id="d1"></div>
  <div class="dot" id="d2"></div>
  <div class="dot" id="d3"></div>
  <div class="dot" id="d4"></div>
  <div class="dot" id="d5"></div>
</div>

<!-- S1 ARRIVAL -->
<div class="screen active" id="s1">
  <span class="s1-word">Today.</span>
  <p class="s1-intro">Find out where the music takes you.</p>
  <span class="s1-hint">tap to begin</span>
</div>

<!-- S2 ENTRY -->
<div class="screen" id="s2">
  <span class="screen-label">Where are you right now</span>
  <div id="entry-list" style="padding-bottom: 80px;"></div>
</div>

<!-- S3 LISTEN -->
<div class="screen" id="s3">
  <div class="listen-top" id="listen-top">
    <span class="listen-label">Listen</span>
    <div class="pulse-wrap">
      <div class="pulse-dot" id="pulse-dot"></div>
      <div class="track-count" id="tc">1 — 5</div>
    </div>
    <div class="ready-prompt" id="ready-prompt">
      <span>Answer now</span>
      <span class="ready-prompt-arrow">↑</span>
    </div>
  </div>
  <div class="assign-panel" id="assign-panel">
    <div class="assign-label">While this plays —</div>
    <div id="assign-list" style="padding-bottom: 32px;"></div>
  </div>
  <div class="thumbs-wrap" id="thumbs-wrap">
    <button class="thumb-btn" id="thumb-down">👎</button>
    <button class="thumb-btn" id="thumb-up">👍</button>
  </div>
  <div id="sc-wrap">
    <iframe id="sc" width="100%" height="166" scrolling="no" frameborder="no"
      allow="autoplay; encrypted-media; picture-in-picture" allowfullscreen
      src="https://w.soundcloud.com/player/?url=https%3A//soundcloud.com/fynd-today/sets/mvp-1&auto_play=false&hide_related=true&show_comments=false&show_user=false&show_reposts=false&show_teaser=false&visual=false">
    </iframe>
  </div>
</div>

<!-- S5 REVEAL -->
<div class="screen" id="s5">
  <span class="reveal-label">That was</span>
  <div class="reveal-title" id="r-title">—</div>
  <div class="reveal-artist" id="r-artist">—</div>
  <div class="reveal-actions">
    <span class="reveal-cta">Press Play on Today.</span>
    <button class="btn-continue" id="btn-continue">Continue</button>
    <button class="btn-stop" id="btn-stop">Stop for now</button>
  </div>
</div>

<!-- S7 RECAP -->
<div class="screen" id="s7">
  <span class="recap-head">Come back to these:</span>
  <div id="recap-list"></div>
  <button class="recap-continue" id="recap-continue">Continue</button>
</div>

<!-- S6 EMAIL -->
<div class="screen" id="s6">
  <div class="email-head" id="email-head">More comes.</div>
  <input class="email-input" id="name-in" type="text" placeholder="first name" autocomplete="given-name" autocapitalize="words" style="margin-bottom: 16px;">
  <input class="email-input" id="email-in" type="email" placeholder="your email" autocomplete="email" autocapitalize="none">
  <button class="email-sub" id="email-sub">I'm in.</button>
  <div id="listen-again" style="display:none; margin-top: 48px; text-align: center; width: 100%;">
    <div style="font-size: 11px; color: var(--black); opacity: 0.35; letter-spacing: 0.12em; text-transform: uppercase; margin-bottom: 20px;">Play another set</div>
    <button class="set-btn" onclick="loadSet('MVP 1.2')">Set 2</button>
    <button class="set-btn" onclick="loadSet('MVP 1.3')">Set 3</button>
    <button class="set-btn" onclick="loadSet('MVP 1.4')">Set 4</button>
    <button class="set-btn" onclick="loadSet('MVP 1.5')">Set 5</button>
  </div>
</div>

<script src="https://w.soundcloud.com/player/api.js"></script>
<script>

var PLAYLIST_TRACKS = {
  'MVP 1': [
    { title:'Soul',                    artist:'Lee Brice'        },
    { title:"We Don't Care",           artist:'Akon'             },
    { title:'In Between',              artist:'Nija'             },
    { title:'I See Life',              artist:'thekidszn'        },
    { title:'Alvarado',                artist:'Sean Jacobs'      },
  ],
  'MVP 1.2': [
    { title:"I'll Be There",           artist:'Yoshi Flower'     },
    { title:'3am',                     artist:'Łaszewo'          },
    { title:'Liquor Store In The Sky', artist:'BJ The Chicago Kid'},
    { title:'SPILL',                   artist:'Presley Regier'   },
    { title:'THE SHADOW',              artist:'KAE'              },
  ],
  'MVP 1.3': [
    { title:'Redline',                 artist:'wdlmusic'         },
    { title:'Shield',                  artist:'WEARETHEGOOD'     },
    { title:"i kno'",                  artist:'Destin Laurel'    },
    { title:"Can't Explain It",        artist:'Jermain Reese Jr.'},
    { title:'That Way',                artist:'XUITCASECITY'     },
  ],
  'MVP 1.4': [
    { title:'You',                     artist:'Benjamin Steer'   },
    { title:'Pretty Lies',             artist:'Adrian Daniel'    },
    { title:'No Tomorrow',             artist:'Afrojack'         },
    { title:'Champagne Dial',          artist:'Col3trane'        },
    { title:'Been That Way',           artist:'Bryson Tiller'    },
  ],
  'MVP 1.5': [
    { title:'Damn Gloves',             artist:'serpentwithfeet'  },
    { title:'Home Alright',            artist:'Terry Zhong'      },
    { title:'2am',                     artist:'PAGEFOURR'        },
    { title:'Mirage',                  artist:'Yoko Gold'        },
    { title:'BLAME',                   artist:'Samuel Petra'     },
  ],
};

// Get tracks for current playlist
function getTrack(playlistName, index) {
  var tracks = PLAYLIST_TRACKS[playlistName] || PLAYLIST_TRACKS['MVP 1'];
  return tracks[index] || { title: '—', artist: '—' };
}

var STMTS = [
  { text:'Something is unresolved and the day keeps moving.',              state:'Holding'    },
  { text:"Something finished. The next thing hasn't started yet.",         state:'Between'    },
  { text:"You're moving. Nothing specific is pulling you forward.",        state:'Drifting'   },
  { text:'Everything keeps sliding past without landing.',                 state:'Unanchored' },
  { text:"Something is in front of you. You haven't stepped into it yet.", state:'Before'     },
];

var sess = {
  id: 'S' + Date.now().toString(36).toUpperCase(),
  entryState: null,
  cur: 0,
  tOrder: [],
  listenStart: null,
  dur: 0,
  log: [],
  playlist: 'MVP 1',
  reaction: '',
};

function shuffle(arr) {
  var a = arr.slice(), i = a.length, j, t;
  while (i--) { j = Math.floor(Math.random() * (i + 1)); t = a[i]; a[i] = a[j]; a[j] = t; }
  return a;
}

function show(id) {
  var all = document.querySelectorAll('.screen');
  for (var i = 0; i < all.length; i++) all[i].classList.remove('active');
  setTimeout(function() {
    var next = document.getElementById(id);
    if (next) next.classList.add('active');
  }, 40);

  var dots = document.getElementById('dots');
  if (id === 's3' || id === 's5') {
    dots.classList.add('show');
    dots.classList.toggle('dark', id === 's3');
  } else {
    dots.classList.remove('show');
    dots.classList.remove('dark');
  }
  var tc = document.getElementById('theme-color');
  var st = document.getElementById('safe-top');
  var sb = document.getElementById('safe-bot');
  if (id === 's3') {
    if (tc) tc.content = '#000000';
    if (st) { st.style.transition = 'none'; st.style.background = '#000000'; }
    if (sb) { sb.style.transition = 'none'; sb.style.background = '#000000'; }
  } else {
    if (tc) tc.content = '#FCFBF4';
    if (st) { st.style.transition = 'none'; st.style.background = '#FCFBF4'; }
    if (sb) { sb.style.transition = 'none'; sb.style.background = '#FCFBF4'; }
  }
}

function setDots(cur) {
  for (var i = 1; i <= 5; i++) {
    var d = document.getElementById('d' + i);
    d.classList.remove('active','done');
    if (i < cur + 1) d.classList.add('done');
    if (i === cur + 1) d.classList.add('active');
  }
}

function stopDot() {
  var dot = document.getElementById('pulse-dot');
  if (dot) dot.classList.add('stopped');
}

function startDot() {
  var dot = document.getElementById('pulse-dot');
  if (dot) dot.classList.remove('stopped');
}


function buildRecap() {
  var el = document.getElementById('recap-list');
  el.innerHTML = '';
  sess.log.forEach(function(a) {
    var wrap = document.createElement('div');
    wrap.className = 'recap-track';
    var song = document.createElement('div');
    song.className = 'recap-song';
    song.textContent = a.trackTitle || '—';
    var dir = document.createElement('div');
    dir.className = 'recap-direction';
    dir.textContent = DIRECTION[a.postState] || '';
    wrap.appendChild(song);
    wrap.appendChild(dir);
    el.appendChild(wrap);
  });
}

function buildList(elId, cls, includeNone, cb) {
  var el = document.getElementById(elId);
  el.innerHTML = '';
  var order = shuffle([0,1,2,3,4]);
  for (var i = 0; i < order.length; i++) {
    (function(s) {
      var d = document.createElement('div');
      d.className = cls;
      d.textContent = s.text;
      d.addEventListener('click', function() {
        if (d.classList.contains('tapped')) return;
        d.classList.add('tapped');
        var st = s.state;
        setTimeout(function() { cb(st); }, 150);
      });
      el.appendChild(d);
    })(STMTS[order[i]]);
  }
  if (includeNone) {
    var n = document.createElement('div');
    n.className = cls;
    n.textContent = 'Something else entirely.';
    n.addEventListener('click', function() {
      if (n.classList.contains('tapped')) return;
      n.classList.add('tapped');
      setTimeout(function() { cb('Something Else'); }, 150);
    });
    el.appendChild(n);
  }
}

function openPanel(cb) {
  // Swap listen label to Answer
  var lbl = document.querySelector('.listen-label');
  if (lbl) lbl.textContent = 'Answer';
  // Fix Safari scroll — prevent touch events bubbling to fixed parent
  var panel = document.getElementById('assign-panel');
  panel.addEventListener('touchmove', function(e) {
    e.stopPropagation();
  }, { passive: true });
  // Safe area: top stays black, bottom becomes off-white
  var sb = document.getElementById('safe-bot');
  if (sb) { sb.style.transition = 'none'; sb.style.background = '#FCFBF4'; }
  // Build three fixed position options
  var el = document.getElementById('assign-list');
  el.innerHTML = '';
  var positions = [
    { text: 'Something in me wants to stay here.', value: 'Stay' },
    { text: 'Something in me wants to move.',      value: 'Move' },
    { text: 'Something just became clearer.',       value: 'Open' },
  ];
  positions.forEach(function(p) {
    var d = document.createElement('div');
    d.className = 'assign-stmt';
    d.textContent = p.text;
    d.addEventListener('click', function() {
      if (d.classList.contains('tapped')) return;
      d.classList.add('tapped');
      var val = p.value;
      setTimeout(function() { cb(val); }, 150);
    });
    el.appendChild(d);
  });
  // Hide ready prompt
  document.getElementById('ready-prompt').classList.remove('show');
  document.getElementById('ready-prompt').style.pointerEvents = 'none';
  document.getElementById('assign-panel').classList.add('open');
}

function resetPanel() {
  var panel = document.getElementById('assign-panel');
  // Kill transition instantly so no white flash
  panel.style.transition = 'none';
  panel.style.maxHeight = '0';
  panel.classList.remove('open');
  document.getElementById('assign-list').innerHTML = '';
  document.getElementById('ready-prompt').classList.remove('show');
  document.getElementById('ready-prompt').style.pointerEvents = 'none';
  // Restore listen label
  var lbl = document.querySelector('.listen-label');
  if (lbl) lbl.textContent = 'Listen';
  // Safe area back to full black
  var sb = document.getElementById('safe-bot');
  if (sb) { sb.style.transition = 'none'; sb.style.background = '#000000'; }
  // Restore transition after reset
  setTimeout(function() {
    panel.style.transition = '';
    panel.style.maxHeight = '';
  }, 100);
}

// SoundCloud
var widget, widgetReady = false, readyTimer, autoTimer, thumbsTimer;

function initSC() {
  widget = SC.Widget(document.getElementById('sc'));
  widget.bind(SC.Widget.Events.READY, function() { widgetReady = true; });
  widget.bind(SC.Widget.Events.FINISH, function() {
    if (widget) widget.pause();
    stopDot();
    if (!document.getElementById('assign-panel').classList.contains('open')) {
      openPanel(function(ps) { doReveal(ps); });
    }
  });
}

function playTrack(idx) {
  function go() {
    resetPanel();
    startDot();
    widget.skip(idx);
    setTimeout(function() { widget.play(); }, 300);
    sess.listenStart = Date.now();
    clearTimeout(readyTimer);
    clearTimeout(autoTimer);

    // At 5s — show thumbs
    clearTimeout(thumbsTimer);
    thumbsTimer = setTimeout(function() {
      document.getElementById('thumbs-wrap').classList.add('show');
    }, 5000);

    // At 30s — hide thumbs, show ready prompt
    readyTimer = setTimeout(function() {
      document.getElementById('thumbs-wrap').classList.remove('show');
      var prompt = document.getElementById('ready-prompt');
      prompt.classList.add('show');
      prompt.style.pointerEvents = 'all';
    }, 30000);

    // At 90s — hard open panel regardless
    autoTimer = setTimeout(function() {
      if (widget) widget.pause();
      stopDot();
      if (!document.getElementById('assign-panel').classList.contains('open')) {
        openPanel(function(ps) { doReveal(ps); });
      }
    }, 90000);

    document.getElementById('tc').textContent = (sess.cur + 1) + ' — 5';
    setDots(sess.cur);
  }
  if (widgetReady) {
    go();
  } else {
    var poll = setInterval(function() { if (widgetReady) { clearInterval(poll); go(); } }, 200);
  }
}

// Ready prompt tap — open panel immediately
document.getElementById('ready-prompt').addEventListener('click', function() {
  clearTimeout(autoTimer);
  if (widget) widget.pause();
  stopDot();
  openPanel(function(ps) { doReveal(ps); });
});

// Thumb up — hide thumbs, store reaction, music keeps playing
document.getElementById('thumb-up').addEventListener('click', function() {
  document.getElementById('thumbs-wrap').classList.remove('show');
  clearTimeout(thumbsTimer);
  sess.reaction = 'Up';
});

// Thumb down — record skip, go straight to next track
document.getElementById('thumb-down').addEventListener('click', function() {
  clearTimeout(thumbsTimer);
  clearTimeout(readyTimer);
  clearTimeout(autoTimer);
  if (widget) widget.pause();
  stopDot();
  document.getElementById('thumbs-wrap').classList.remove('show');

  var dur = sess.listenStart ? Math.min(Math.round((Date.now() - sess.listenStart) / 1000), 90) : 0;
  var ti = sess.tOrder[sess.cur];
  var tr = getTrack(sess.playlist, ti);
  var sessionTrackId = 'T00' + (sess.cur + 1);
  var trackTitle = tr.title + ' — ' + tr.artist;
  var week = 'W' + String(Math.max(1, Math.ceil((Date.now() - new Date('2026-03-15').getTime()) / (7*24*60*60*1000)))).padStart(2,'0');

  fetch('/.netlify/functions/log-session', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      sessionId: sess.id,
      email: '',
      entryState: sess.entryState,
      assignments: [{ trackId: sessionTrackId, trackTitle: trackTitle, duration: dur, postState: 'Skipped', reaction: 'Down', week: week, playlist: sess.playlist }],
    }),
  }).catch(function(err) { console.error('Skip log error:', err); });

  sess.cur++;
  resetPanel();
  if (sess.cur < 5) {
    show('s3');
    if (widgetReady) {
      widget.skip(sess.tOrder[sess.cur]);
      widget.play();
      sess._playedOnGesture = true;
    }
    setTimeout(function() { playTrack(sess.tOrder[sess.cur]); }, 600);
  } else {
    buildRecap();
    show('s7');
  }
});

  var DIRECTION = {
    'Stay': 'When you want to stay with the moment.',
    'Move': 'When you want to move from the moment.',
    'Open': 'When you want the moment to open up.',
    'Something Else': 'When none of these landed — keep listening.',
  };

function doReveal(ps) {
  clearTimeout(readyTimer);
  clearTimeout(autoTimer);
  if (widget) widget.pause();
  stopDot();
  sess.dur = sess.listenStart ? Math.min(Math.round((Date.now() - sess.listenStart) / 1000), 90) : 0;
  var ti = sess.tOrder[sess.cur];
  var tr = getTrack(sess.playlist, ti);
  // Track ID reflects session position (1-5), not playlist position
  var sessionTrackId = 'T00' + (sess.cur + 1);
  // Track Title is "Song Name — Artist Name"
  var trackTitle = tr.title + ' — ' + tr.artist;
  var assignment = { sessionId:sess.id, trackId:sessionTrackId, trackTitle:trackTitle, entryState:sess.entryState, postState:ps, duration:sess.dur };
  sess.log.push(assignment);

  // Send this track's data immediately — don't wait for email
  var week = 'W' + String(Math.max(1, Math.ceil((Date.now() - new Date('2026-03-15').getTime()) / (7*24*60*60*1000)))).padStart(2,'0');
  fetch('/.netlify/functions/log-session', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      sessionId: sess.id,
      email: '',
      entryState: sess.entryState,
      assignments: [{ trackId: sessionTrackId, trackTitle: trackTitle, duration: assignment.duration, postState: assignment.postState, week: week, playlist: sess.playlist, reaction: sess.reaction }],
    }),
  }).catch(function(err) { console.error('Track log error:', err); });

  sess.reaction = '';
  document.getElementById('r-title').textContent = tr.title;
  document.getElementById('r-artist').textContent = tr.artist;
  show('s5');
}

// S1 tap
document.getElementById('s1').addEventListener('click', function() {
  sess.tOrder = shuffle([0,1,2,3,4]);
  // Prime Safari audio on first gesture
  if (widgetReady) {
    widget.skip(sess.tOrder[0]);
    widget.play();
    setTimeout(function() { widget.pause(); }, 200);
  }
  buildList('entry-list', 'stmt', true, function(state) {
    sess.entryState = state;
    show('s3');
    setTimeout(function() {
      var idx = sess.tOrder[sess.cur];
      if (widgetReady) {
        widget.skip(idx);
        widget.play();
        sess._playedOnGesture = true;
      }
      setTimeout(function() { playTrack(sess.tOrder[sess.cur]); }, 400);
    }, 250);
  });
  show('s2');
});

// Continue button
document.getElementById('btn-continue').addEventListener('click', function() {
  sess.cur++;
  if (sess.cur < 5) {
    // Reset panel immediately so off-white never shows during transition
    resetPanel();
    show('s3');
    // Play on user gesture for Safari
    if (widgetReady) {
      widget.skip(sess.tOrder[sess.cur]);
      widget.play();
      sess._playedOnGesture = true;
    }
    setTimeout(function() { playTrack(sess.tOrder[sess.cur]); }, 600);
  } else {
    buildRecap();
    show('s7');
  }
});

// Stop for now — go to email
document.getElementById('btn-stop').addEventListener('click', function() {
  show('s6');
});

// Recap continue -> email
document.getElementById('recap-continue').addEventListener('click', function() {
  show('s6');
});

// Email
document.getElementById('email-sub').addEventListener('click', function() {
  var firstName = document.getElementById('name-in').value.trim();
  var email = document.getElementById('email-in').value.trim();
  if (!firstName) { document.getElementById('name-in').style.borderBottomColor = 'rgba(0,0,0,0.9)'; return; }
  if (!email || !email.includes('@')) { document.getElementById('email-in').style.borderBottomColor = 'rgba(0,0,0,0.9)'; return; }
  document.getElementById('name-in').style.display = 'none';
  document.getElementById('email-in').style.display = 'none';
  document.getElementById('email-sub').style.display = 'none';
  var h = document.getElementById('email-head');
  h.textContent = "You'll hear when something new arrives.";
  h.style.fontSize = '18px';
  h.style.opacity = '0.6';
  // Show listen again button immediately with confirmation
  var again = document.getElementById('listen-again');
  if (again) again.style.display = 'block';
  // Email submitted — update records for this session
  // Send email update — patches all records for this session with email
  fetch('/.netlify/functions/log-session', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      sessionId: sess.id,
      email: email,
      firstName: firstName,
      entryState: sess.entryState,
      emailUpdate: true,
    }),
  }).then(function(r) { return r.json(); })
  .then(function(result) { console.log('Email logged:', result); })
  .catch(function(err) { console.error('Email log error:', err); });
});

document.getElementById('email-in').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') document.getElementById('email-sub').click();
});


function setLabel(playlistName) {
  var labels = {
    'MVP 1.2': 'Set 2',
    'MVP 1.3': 'Set 3',
    'MVP 1.4': 'Set 4',
    'MVP 1.5': 'Set 5',
  };
  return labels[playlistName] || '';
}

function loadSet(playlistName) {
  // Mark this set button as used
  var btns = document.querySelectorAll('.set-btn');
  btns.forEach(function(b) {
    if (b.textContent.trim() === setLabel(playlistName)) {
      b.classList.add('used');
    }
  });

  // Reset panel and dot immediately so s3 is clean before showing
  resetPanel();
  startDot();

  // Reset session for new set
  sess.cur = 0;
  sess.tOrder = shuffle([0,1,2,3,4]);
  sess.log = [];
  sess.listenStart = null;
  sess.id = 'S' + Date.now().toString(36).toUpperCase();

  // Show s3 immediately so person sees black screen right away
  show('s3');
  document.getElementById('tc').textContent = '1 — 5';

  // Update SoundCloud widget to new playlist
  var playlistUrls = {
    'MVP 1':   'https://soundcloud.com/fynd-today/sets/mvp-1',
    'MVP 1.2': 'https://soundcloud.com/fynd-today/sets/mvp-1-2',
    'MVP 1.3': 'https://soundcloud.com/fynd-today/sets/mvp-1-3',
    'MVP 1.4': 'https://soundcloud.com/fynd-today/sets/mvp-1-4',
    'MVP 1.5': 'https://soundcloud.com/fynd-today/sets/mvp-1-5',
  };

  sess.playlist = playlistName;
  var url = playlistUrls[playlistName] || playlistUrls['MVP 1'];
  var iframe = document.getElementById('sc');
  iframe.src = 'https://w.soundcloud.com/player/?url=' + encodeURIComponent(url) + '&auto_play=false&hide_related=true&show_comments=false&show_user=false&show_reposts=false&show_teaser=false&visual=false';

  // Reinit widget after iframe reload — wait for it to be ready
  widgetReady = false;
  setTimeout(function() {
    initSC();
    setTimeout(function() {
      playTrack(sess.tOrder[sess.cur]);
    }, 800);
  }, 1200);
}

initSC();

// Capture partial listen if tab closed mid-session
window.addEventListener('beforeunload', function() {
  if (!sess.listenStart) return;
  var dur = Math.min(Math.round((Date.now() - sess.listenStart) / 1000), 90);
  if (dur < 2) return; // ignore accidental closes
  var ti = sess.tOrder[sess.cur];
  if (ti === undefined) return;
  var tr = getTrack(sess.playlist, ti);
  var week = 'W' + String(Math.max(1, Math.ceil((Date.now() - new Date('2026-03-15').getTime()) / (7*24*60*60*1000)))).padStart(2,'0');
  // Use sendBeacon for reliability on page close
  var payload = JSON.stringify({
    sessionId: sess.id,
    email: '',
    entryState: sess.entryState,
    assignments: [{
      trackId: 'T00' + (sess.cur + 1),
      trackTitle: tr.title + ' — ' + tr.artist,
      duration: dur,
      postState: 'Abandoned',
      reaction: sess.reaction || '',
      week: week,
      playlist: sess.playlist,
    }],
  });
  if (navigator.sendBeacon) {
    navigator.sendBeacon('/.netlify/functions/log-session', new Blob([payload], { type: 'application/json' }));
  }
});

// Prevent s3 from swallowing touchmove so assign panel can scroll on Safari
document.getElementById('s3').addEventListener('touchmove', function(e) {
  var panel = document.getElementById('assign-panel');
  if (panel && panel.classList.contains('open')) {
    // Allow scroll only inside the panel
    if (!panel.contains(e.target)) {
      e.preventDefault();
    }
  }
}, { passive: false });
